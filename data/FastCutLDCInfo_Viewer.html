        let currentTable = "Table1";

        function initTabs() {
            const container = document.getElementById('tabs-container');
            container.innerHTML = '';
            
            Object.keys(database).forEach(tableName => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${tableName === currentTable ? 'active' : ''}`;
                btn.id = `btn-${tableName}`;
                btn.textContent = `${tableName}: ${database[tableName].title.split(' ')[0]}`;
                btn.onclick = () => selectTab(tableName);
                container.appendChild(btn);
            });
            
            updateTable();
        }

        function selectTab(tableName) {
            document.querySelector(`.tab-btn.active`).classList.remove('active');
            document.getElementById(`btn-${tableName}`).classList.add('active');
            currentTable = tableName;
            document.getElementById('search-input').value = '';
            updateTable();
        }

        function formatOffset(val) {
            if (val === 0 || val === 0.0) return `<span class="badge-offset offset-zero">0</span>`;
            const cls = val > 0 ? 'offset-positive' : 'offset-negative';
            const sign = val > 0 ? '+' : '';
            return `<span class="badge-offset ${cls}">${sign}${val}</span>`;
        }

        function updateTable() {
            const tableData = database[currentTable];
            document.getElementById('table-subtitle').textContent = `当前表: ${currentTable} — ${tableData.title}`;
            filterData();
        }

        function filterData() {
            const searchQuery = document.getElementById('search-input').value.toLowerCase();
            const tableData = database[currentTable];
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            const filteredRows = tableData.rows.filter(row => {
                const matchesPhenomenon = (row.mainPhenomenon || '').toLowerCase().includes(searchQuery);
                const matchesLevel = (row.phenomenonLevel || '').toLowerCase().includes(searchQuery);
                const matchesDesc = (row.description || '').toLowerCase().includes(searchQuery);
                const matchesText1 = (row.text1 || '').toLowerCase().includes(searchQuery);
                return matchesPhenomenon || matchesLevel || matchesDesc || matchesText1;
            });

            filteredRows.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${row.tableIdx}</td>
                    <td><span class="badge-defect">${row.mainPhenomenon || '未知'}</span></td>
                    <td style="font-weight: 500; color: #f1f5f9;">${row.phenomenonLevel || ''}</td>
                    <td style="color: #fca5a5;">${row.description || ''}</td>
                    <td>${formatOffset(row.cutVelocity)}</td>
                    <td>${formatOffset(row.cutHeight)}</td>
                    <td>${formatOffset(row.laserPowerPercentage)}</td>
                    <td>${formatOffset(row.focusPostion)}</td>
                    <td>${formatOffset(row.gasPressure)}</td>
                    <td>${formatOffset(row.gasPressure2)}</td>
                    <td>${formatOffset(row.dutyCycle)}</td>
                    <td>${formatOffset(row.pulseFrequency)}</td>
                    <td class="text-advice">${row.text1 || ''}</td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('stats-badge').textContent = `共 ${filteredRows.length} 个案例`;
        }

        // Initialize
        initTabs();
    </script>
